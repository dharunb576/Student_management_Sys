<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Courses — EduManage</title>
  <link rel="stylesheet" href="css/style.css" />
</head>

<body>
  <div class="app-layout">
    <aside class="sidebar">
      <div class="sidebar-brand">
        <div class="logo">🎓</div>
        <span>EduManage<small>Management System</small></span>
      </div>
      <nav class="sidebar-nav">
        <div class="nav-label">Menu</div>
        <a class="nav-item" href="dashboard.html"><span class="icon">📊</span> Dashboard</a>
        <a class="nav-item" href="students.html"><span class="icon">👤</span> Students</a>
        <a class="nav-item active" href="courses.html"><span class="icon">📚</span> Courses</a>
        <a class="nav-item" href="enrollment.html"><span class="icon">📝</span> Enrollment</a>
      </nav>
      <div class="sidebar-footer">
        <!-- Profile Dropdown -->
        <div class="profile-dropdown" id="profileDropdown">
          <div class="pd-section">
            <div class="pd-section-title">Account</div>
            <div class="pd-account">
              <div class="pd-avatar" id="pdAvatar">U</div>
              <div class="pd-info">
                <div class="pd-name" id="pdName">—</div>
                <div class="pd-email" id="pdEmail">—</div>
                <div class="pd-role-badge" id="pdRole">—</div>
              </div>
            </div>
          </div>
          <div class="pd-section">
            <div class="pd-section-title">Appearance</div>
            <div class="theme-toggle">
              <button data-theme="light" onclick="applyTheme('light')">☀️ Light</button>
              <button data-theme="dark" onclick="applyTheme('dark')">🌙 Dark</button>
              <button data-theme="system" onclick="applyTheme('system')">💻 System</button>
            </div>
          </div>
          <div class="pd-section">
            <button class="pd-toggle-btn" onclick="togglePdSection('pdNameSection', this)">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
              Change Display Name
            </button>
            <div class="pd-collapsible" id="pdNameSection">
              <form class="pd-form" onsubmit="updateDisplayName(event)">
                <div id="pdNameAlert" class="pd-alert"></div>
                <div class="form-group"><label>New Name</label><input type="text" id="pdNewName" required placeholder="Enter new name"/></div>
                <button type="submit" class="btn btn-primary btn-sm" style="width:auto">Save</button>
              </form>
            </div>
          </div>
          <div class="pd-section">
            <button class="pd-toggle-btn" onclick="togglePdSection('pdPwSection', this)">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
              Change Password
            </button>
            <div class="pd-collapsible" id="pdPwSection">
              <form class="pd-form" onsubmit="changeUserPassword(event)">
                <div id="pdPwAlert" class="pd-alert"></div>
                <div class="form-group"><label>Current Password</label><input type="password" id="pdCurrentPw" required/></div>
                <div class="form-group"><label>New Password</label><input type="password" id="pdNewPw" required minlength="6"/></div>
                <div class="form-group"><label>Confirm Password</label><input type="password" id="pdConfirmPw" required minlength="6"/></div>
                <button type="submit" class="btn btn-primary btn-sm" style="width:auto">Change</button>
              </form>
            </div>
          </div>
        </div>
        <div class="user-card" onclick="toggleProfileDropdown(event)">
          <div class="user-avatar" id="userAvatar">U</div>
          <div class="user-info">
            <div class="user-name" id="userName">Loading...</div>
            <div class="user-role" id="userRole">—</div>
          </div>
          <button class="logout-btn" onclick="event.stopPropagation(); logout()" title="Logout">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
          </button>
        </div>
      </div>
    </aside>
    <main class="main-content">
      <div class="page-header">
        <div>
          <div class="page-title">Courses</div>
          <div class="page-subtitle">Manage all available courses</div>
        </div>
        <button class="btn btn-primary" id="addBtn" onclick="openModal('courseModal')" style="width:auto">+ Add
          Course</button>
      </div>
      <div id="alertBox" class="alert"></div>
      <div class="card">
        <div class="card-header"><span class="card-title">All Courses</span></div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>#</th>
                <th>Course Name</th>
                <th>Description</th>
                <th>Duration</th>
                <th>Fee</th>
                <th>Status</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="coursesTable">
              <tr class="loading-row">
                <td colspan="7">Loading courses...</td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </main>
  </div>
  <div class="modal-overlay" id="courseModal">
    <div class="modal">
      <div class="modal-header">
        <span class="modal-title" id="modalTitle">Add Course</span>
        <button class="modal-close" onclick="closeModal('courseModal')">✕</button>
      </div>
      <div class="modal-body">
        <form onsubmit="saveCourse(event)">
          <input type="hidden" id="courseId" />
          <div class="form-group"><label>Course Name</label><input type="text" id="cName" required /></div>
          <div class="form-group"><label>Description</label><input type="text" id="cDesc" required /></div>
          <div class="form-group"><label>Duration</label><input type="text" id="cDuration" placeholder="e.g. 3 months"
              required /></div>
          <div class="form-group"><label>Fee (₹)</label><input type="number" id="cFee" min="0" required /></div>
          <div class="modal-footer" style="padding:0;border:none;margin-top:8px">
            <button type="button" class="btn btn-outline" onclick="closeModal('courseModal')">Cancel</button>
            <button type="submit" class="btn btn-primary" style="width:auto">Save</button>
          </div>
        </form>
      </div>
    </div>
  </div>
  <script src="js/api.js"></script>
  <script>
    window.onload = function () {
      requireAuth();
      renderUserInfo();
      loadStudents(); // or loadCourses() or loadAll()
    };
    requireAuth();
    renderUserInfo();
    let allCourses = [];
    if (!canDo('create')) document.getElementById('addBtn').style.display = 'none';
    async function loadCourses() {
      try {
        allCourses = await apiFetch('/courses');
        const tbody = document.getElementById('coursesTable');
        if (!allCourses.length) { tbody.innerHTML = `<tr><td colspan="7" style="text-align:center;padding:40px;color:var(--gray)">No courses yet</td></tr>`; return; }
        tbody.innerHTML = allCourses.map((c, i) => `
        <tr>
          <td>${i + 1}</td>
          <td><strong>${c.name}</strong></td>
          <td>${c.description}</td>
          <td>${c.duration}</td>
          <td>₹${Number(c.fee).toLocaleString()}</td>
          <td><span class="badge ${c.isActive !== false ? 'badge-success' : 'badge-danger'}">${c.isActive !== false ? 'Active' : 'Inactive'}</span></td>
          <td><div class="actions">
            ${canDo('edit') ? `<button class="btn btn-warning btn-sm" onclick="editCourse(${c.id})">✏️ Edit</button>` : ''}
            ${canDo('delete') ? `<button class="btn btn-danger btn-sm" onclick="deleteCourse(${c.id},'${c.name}')">🗑️</button>` : ''}
            ${!canDo('edit') ? '<span style="color:var(--gray);font-size:13px">View only</span>' : ''}
          </div></td>
        </tr>`).join('');
      } catch (err) { showAlert('alertBox', err.message, 'danger'); }
    }
    async function saveCourse(e) {
      e.preventDefault();
      const id = document.getElementById('courseId').value;
      const body = { name: document.getElementById('cName').value, description: document.getElementById('cDesc').value, duration: document.getElementById('cDuration').value, fee: parseFloat(document.getElementById('cFee').value) };
      try {
        if (id) { await apiFetch(`/courses/${id}`, { method: 'PUT', body: JSON.stringify(body) }); showAlert('alertBox', 'Updated!', 'success'); }
        else { await apiFetch('/courses', { method: 'POST', body: JSON.stringify(body) }); showAlert('alertBox', 'Course added!', 'success'); }
        closeModal('courseModal'); loadCourses();
      } catch (err) { showAlert('alertBox', err.message, 'danger'); }
    }
    function editCourse(id) {
      const c = allCourses.find(c => c.id === id);
      if (!c) return;
      document.getElementById('modalTitle').textContent = 'Edit Course';
      document.getElementById('courseId').value = c.id;
      document.getElementById('cName').value = c.name;
      document.getElementById('cDesc').value = c.description;
      document.getElementById('cDuration').value = c.duration;
      document.getElementById('cFee').value = c.fee;
      openModal('courseModal');
    }
    async function deleteCourse(id, name) {
      if (!confirm(`Delete "${name}"?`)) return;
      try { await apiFetch(`/courses/${id}`, { method: 'DELETE' }); showAlert('alertBox', 'Deleted!', 'success'); loadCourses(); }
      catch (err) { showAlert('alertBox', err.message, 'danger'); }
    }
    loadCourses();
  </script>
</body>

</html>
