<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Students — EduManage</title>
  <link rel="stylesheet" href="css/style.css" />
</head>

<body>
  <div class="app-layout">
    <aside class="sidebar">
      <div class="sidebar-brand">
        <div class="logo">🎓</div>
        <span>EduManage<small>Management System</small></span>
      </div>
      <nav class="sidebar-nav">
        <div class="nav-label">Menu</div>
        <a class="nav-item" href="dashboard.html"><span class="icon">📊</span> Dashboard</a>
        <a class="nav-item active" href="students.html"><span class="icon">👤</span> Students</a>
        <a class="nav-item" href="courses.html"><span class="icon">📚</span> Courses</a>
        <a class="nav-item" href="enrollment.html"><span class="icon">📝</span> Enrollment</a>
      </nav>
      <div class="sidebar-footer">
        <!-- Profile Dropdown -->
        <div class="profile-dropdown" id="profileDropdown">
          <div class="pd-section">
            <div class="pd-section-title">Account</div>
            <div class="pd-account">
              <div class="pd-avatar" id="pdAvatar">U</div>
              <div class="pd-info">
                <div class="pd-name" id="pdName">—</div>
                <div class="pd-email" id="pdEmail">—</div>
                <div class="pd-role-badge" id="pdRole">—</div>
              </div>
            </div>
          </div>
          <div class="pd-section">
            <div class="pd-section-title">Appearance</div>
            <div class="theme-toggle">
              <button data-theme="light" onclick="applyTheme('light')">☀️ Light</button>
              <button data-theme="dark" onclick="applyTheme('dark')">🌙 Dark</button>
              <button data-theme="system" onclick="applyTheme('system')">💻 System</button>
            </div>
          </div>
          <div class="pd-section">
            <button class="pd-toggle-btn" onclick="togglePdSection('pdNameSection', this)">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
              Change Display Name
            </button>
            <div class="pd-collapsible" id="pdNameSection">
              <form class="pd-form" onsubmit="updateDisplayName(event)">
                <div id="pdNameAlert" class="pd-alert"></div>
                <div class="form-group"><label>New Name</label><input type="text" id="pdNewName" required placeholder="Enter new name"/></div>
                <button type="submit" class="btn btn-primary btn-sm" style="width:auto">Save</button>
              </form>
            </div>
          </div>
          <div class="pd-section">
            <button class="pd-toggle-btn" onclick="togglePdSection('pdPwSection', this)">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
              Change Password
            </button>
            <div class="pd-collapsible" id="pdPwSection">
              <form class="pd-form" onsubmit="changeUserPassword(event)">
                <div id="pdPwAlert" class="pd-alert"></div>
                <div class="form-group"><label>Current Password</label><input type="password" id="pdCurrentPw" required/></div>
                <div class="form-group"><label>New Password</label><input type="password" id="pdNewPw" required minlength="6"/></div>
                <div class="form-group"><label>Confirm Password</label><input type="password" id="pdConfirmPw" required minlength="6"/></div>
                <button type="submit" class="btn btn-primary btn-sm" style="width:auto">Change</button>
              </form>
            </div>
          </div>
        </div>
        <div class="user-card" onclick="toggleProfileDropdown(event)">
          <div class="user-avatar" id="userAvatar">U</div>
          <div class="user-info">
            <div class="user-name" id="userName">Loading...</div>
            <div class="user-role" id="userRole">—</div>
          </div>
          <button class="logout-btn" onclick="event.stopPropagation(); logout()" title="Logout">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
          </button>
        </div>
      </div>
    </aside>
    <main class="main-content">
      <div class="page-header">
        <div>
          <div class="page-title">Students</div>
          <div class="page-subtitle">Manage all student records</div>
        </div>
        <button class="btn btn-primary" id="addBtn" onclick="openModal('studentModal')" style="width:auto">+ Add
          Student</button>
      </div>
      <div id="alertBox" class="alert"></div>
      <div class="card">
        <div class="card-header">
          <span class="card-title">All Students</span>
          <input class="search-input" style="width:220px" placeholder="🔍 Search by name..."
            oninput="filterStudents(this.value)" />
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>#</th>
                <th>Name</th>
                <th>Email</th>
                <th>Phone</th>
                <th>Address</th>
                <th>Date of Birth</th>
                <th>Status</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="studentsTable">
              <tr class="loading-row">
                <td colspan="8">Loading students...</td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </main>
  </div>
  <div class="modal-overlay" id="studentModal">
    <div class="modal">
      <div class="modal-header">
        <span class="modal-title" id="modalTitle">Add Student</span>
        <button class="modal-close" onclick="closeModal('studentModal')">✕</button>
      </div>
      <div class="modal-body">
        <form id="studentForm" onsubmit="saveStudent(event)">
          <input type="hidden" id="studentId" />
          <div class="form-group"><label>Full Name</label><input type="text" id="sName" required /></div>
          <div class="form-group"><label>Email</label><input type="email" id="sEmail" required /></div>
          <div class="form-group"><label>Phone</label><input type="text" id="sPhone" required /></div>
          <div class="form-group"><label>Address</label><input type="text" id="sAddress" required /></div>
          <div class="form-group"><label>Date of Birth</label><input type="date" id="sDob" required /></div>
          <div class="modal-footer" style="padding:0;border:none;margin-top:8px">
            <button type="button" class="btn btn-outline" onclick="closeModal('studentModal')">Cancel</button>
            <button type="submit" class="btn btn-primary" style="width:auto">Save</button>
          </div>
        </form>
      </div>
    </div>
  </div>
  <script src="js/api.js"></script>
  <script>
    window.onload = function () {
      requireAuth();
      renderUserInfo();
      loadStudents(); // or loadCourses() or loadAll()
    };
    requireAuth();
    renderUserInfo();
    let allStudents = [];
    if (!canDo('create')) document.getElementById('addBtn').style.display = 'none';
    async function loadStudents() {
      try {
        allStudents = await apiFetch('/students');
        renderTable(allStudents);
      } catch (err) {
        document.getElementById('studentsTable').innerHTML = `<tr><td colspan="8" style="text-align:center;color:var(--danger);padding:40px">${err.message}</td></tr>`;
      }
    }
    function renderTable(students) {
      const tbody = document.getElementById('studentsTable');
      if (!students.length) { tbody.innerHTML = `<tr><td colspan="8" style="text-align:center;padding:40px;color:var(--gray)">No students found</td></tr>`; return; }
      tbody.innerHTML = students.map((s, i) => `
      <tr>
        <td>${i + 1}</td>
        <td><strong>${s.name}</strong></td>
        <td>${s.email}</td>
        <td>${s.phone}</td>
        <td>${s.address}</td>
        <td>${s.dateOfBirth}</td>
        <td><span class="badge ${s.isActive !== false ? 'badge-success' : 'badge-danger'}">${s.isActive !== false ? 'Active' : 'Inactive'}</span></td>
        <td><div class="actions">
          ${canDo('edit') ? `<button class="btn btn-warning btn-sm" onclick="editStudent(${s.id})">✏️ Edit</button>` : ''}
          ${canDo('delete') ? `<button class="btn btn-danger btn-sm" onclick="deleteStudent(${s.id},'${s.name}')">🗑️</button>` : ''}
          ${!canDo('edit') ? '<span style="color:var(--gray);font-size:13px">View only</span>' : ''}
        </div></td>
      </tr>`).join('');
    }
    function filterStudents(q) {
      renderTable(allStudents.filter(s => s.name.toLowerCase().includes(q.toLowerCase()) || s.email.toLowerCase().includes(q.toLowerCase())));
    }
    async function saveStudent(e) {
      e.preventDefault();
      const id = document.getElementById('studentId').value;
      const body = { name: document.getElementById('sName').value, email: document.getElementById('sEmail').value, phone: document.getElementById('sPhone').value, address: document.getElementById('sAddress').value, dateOfBirth: document.getElementById('sDob').value };
      try {
        if (id) { await apiFetch(`/students/${id}`, { method: 'PUT', body: JSON.stringify(body) }); showAlert('alertBox', 'Student updated!', 'success'); }
        else { await apiFetch('/students', { method: 'POST', body: JSON.stringify(body) }); showAlert('alertBox', 'Student added!', 'success'); }
        closeModal('studentModal');
        loadStudents();
      } catch (err) { showAlert('alertBox', err.message, 'danger'); }
    }
    function editStudent(id) {
      const s = allStudents.find(s => s.id === id);
      if (!s) return;
      document.getElementById('modalTitle').textContent = 'Edit Student';
      document.getElementById('studentId').value = s.id;
      document.getElementById('sName').value = s.name;
      document.getElementById('sEmail').value = s.email;
      document.getElementById('sPhone').value = s.phone;
      document.getElementById('sAddress').value = s.address;
      document.getElementById('sDob').value = s.dateOfBirth;
      openModal('studentModal');
    }
    async function deleteStudent(id, name) {
      if (!confirm(`Delete "${name}"?`)) return;
      try { await apiFetch(`/students/${id}`, { method: 'DELETE' }); showAlert('alertBox', 'Deleted!', 'success'); loadStudents(); }
      catch (err) { showAlert('alertBox', err.message, 'danger'); }
    }
    loadStudents();
  </script>
</body>

</html>
