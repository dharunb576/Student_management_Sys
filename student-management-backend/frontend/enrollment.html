<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Enrollment — EduManage</title>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>
<div class="app-layout">
  <aside class="sidebar">
    <div class="sidebar-brand">
      <div class="logo">🎓</div>
      <span>EduManage<small>Management System</small></span>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-label">Menu</div>
      <a class="nav-item" href="dashboard.html"><span class="icon">📊</span> Dashboard</a>
      <a class="nav-item" href="students.html"><span class="icon">👤</span> Students</a>
      <a class="nav-item" href="courses.html"><span class="icon">📚</span> Courses</a>
      <a class="nav-item active" href="enrollment.html"><span class="icon">📝</span> Enrollment</a>
    </nav>
    <div class="sidebar-footer">
      <!-- Profile Dropdown -->
      <div class="profile-dropdown" id="profileDropdown">
        <div class="pd-section">
          <div class="pd-section-title">Account</div>
          <div class="pd-account">
            <div class="pd-avatar" id="pdAvatar">U</div>
            <div class="pd-info">
              <div class="pd-name" id="pdName">—</div>
              <div class="pd-email" id="pdEmail">—</div>
              <div class="pd-role-badge" id="pdRole">—</div>
            </div>
          </div>
        </div>
        <div class="pd-section">
          <div class="pd-section-title">Appearance</div>
          <div class="theme-toggle">
            <button data-theme="light" onclick="applyTheme('light')">☀️ Light</button>
            <button data-theme="dark" onclick="applyTheme('dark')">🌙 Dark</button>
            <button data-theme="system" onclick="applyTheme('system')">💻 System</button>
          </div>
        </div>
        <div class="pd-section">
          <button class="pd-toggle-btn" onclick="togglePdSection('pdNameSection', this)">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
            Change Display Name
          </button>
          <div class="pd-collapsible" id="pdNameSection">
            <form class="pd-form" onsubmit="updateDisplayName(event)">
              <div id="pdNameAlert" class="pd-alert"></div>
              <div class="form-group"><label>New Name</label><input type="text" id="pdNewName" required placeholder="Enter new name"/></div>
              <button type="submit" class="btn btn-primary btn-sm" style="width:auto">Save</button>
            </form>
          </div>
        </div>
        <div class="pd-section">
          <button class="pd-toggle-btn" onclick="togglePdSection('pdPwSection', this)">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
            Change Password
          </button>
          <div class="pd-collapsible" id="pdPwSection">
            <form class="pd-form" onsubmit="changeUserPassword(event)">
              <div id="pdPwAlert" class="pd-alert"></div>
              <div class="form-group"><label>Current Password</label><input type="password" id="pdCurrentPw" required/></div>
              <div class="form-group"><label>New Password</label><input type="password" id="pdNewPw" required minlength="6"/></div>
              <div class="form-group"><label>Confirm Password</label><input type="password" id="pdConfirmPw" required minlength="6"/></div>
              <button type="submit" class="btn btn-primary btn-sm" style="width:auto">Change</button>
            </form>
          </div>
        </div>
      </div>
      <div class="user-card" onclick="toggleProfileDropdown(event)">
        <div class="user-avatar" id="userAvatar">U</div>
        <div class="user-info">
          <div class="user-name" id="userName">Loading...</div>
          <div class="user-role" id="userRole">—</div>
        </div>
        <button class="logout-btn" onclick="event.stopPropagation(); logout()" title="Logout">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        </button>
      </div>
    </div>
  </aside>
  <main class="main-content">
    <div class="page-header">
      <div><div class="page-title">Enrollment</div><div class="page-subtitle">Manage student course enrollments</div></div>
      <button class="btn btn-primary" id="addBtn" onclick="openModal('enrollModal')" style="width:auto">+ Enroll Student</button>
    </div>
    <div id="alertBox" class="alert"></div>
    <div class="card">
      <div class="card-header"><span class="card-title">All Enrollments</span></div>
      <div class="table-wrap">
        <table>
          <thead><tr><th>#</th><th>Student</th><th>Course</th><th>Date</th><th>Status</th><th>Actions</th></tr></thead>
          <tbody id="enrollTable"><tr class="loading-row"><td colspan="6">Loading...</td></tr></tbody>
        </table>
      </div>
    </div>
  </main>
</div>

<div class="modal-overlay" id="enrollModal">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">Enroll Student</span>
      <button class="modal-close" onclick="closeModal('enrollModal')">✕</button>
    </div>
    <div class="modal-body">
      <form onsubmit="saveEnrollment(event)">
        <div class="form-group"><label>Student</label><select id="eStudent" required><option value="">Select student...</option></select></div>
        <div class="form-group"><label>Course</label><select id="eCourse" required><option value="">Select course...</option></select></div>
        <div class="form-group"><label>Enrollment Date</label><input type="date" id="eDate" required/></div>
        <div class="modal-footer" style="padding:0;border:none;margin-top:8px">
          <button type="button" class="btn btn-outline" onclick="closeModal('enrollModal')">Cancel</button>
          <button type="submit" class="btn btn-primary" style="width:auto">Enroll</button>
        </div>
      </form>
    </div>
  </div>
</div>

<div class="modal-overlay" id="statusModal">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">Update Status</span>
      <button class="modal-close" onclick="closeModal('statusModal')">✕</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="statusEnrollId"/>
      <div class="form-group">
        <label>New Status</label>
        <select id="newStatus">
          <option value="active">Active</option>
          <option value="completed">Completed</option>
          <option value="dropped">Dropped</option>
        </select>
      </div>
      <div class="modal-footer" style="padding:0;border:none;margin-top:8px">
        <button class="btn btn-outline" onclick="closeModal('statusModal')">Cancel</button>
        <button class="btn btn-primary" style="width:auto" onclick="updateStatus()">Update</button>
      </div>
    </div>
  </div>
</div>

<script src="js/api.js"></script>
<script>
    window.onload = function() {
  requireAuth();
  renderUserInfo();
  loadStudents(); // or loadCourses() or loadAll()
};
  requireAuth();
  renderUserInfo();
  if (!canDo('enroll')) document.getElementById('addBtn').style.display = 'none';
  document.getElementById('eDate').value = new Date().toISOString().split('T')[0];

  async function loadAll() {
    try {
      const [enrollments, students, courses] = await Promise.all([apiFetch('/enrollment'), apiFetch('/students'), apiFetch('/courses')]);
      const eSel = document.getElementById('eStudent');
      const cSel = document.getElementById('eCourse');
      eSel.innerHTML = '<option value="">Select student...</option>';
      cSel.innerHTML = '<option value="">Select course...</option>';
      students.forEach(s => eSel.innerHTML += `<option value="${s.id}">${s.name}</option>`);
      courses.forEach(c => cSel.innerHTML += `<option value="${c.id}">${c.name}</option>`);
      const tbody = document.getElementById('enrollTable');
      if (!enrollments.length) { tbody.innerHTML = `<tr><td colspan="6" style="text-align:center;padding:40px;color:var(--gray)">No enrollments yet</td></tr>`; return; }
      tbody.innerHTML = enrollments.map((e,i) => `
        <tr>
          <td>${i+1}</td>
          <td><strong>${e.student?.name||'—'}</strong></td>
          <td>${e.course?.name||'—'}</td>
          <td>${e.enrollmentDate||'—'}</td>
          <td><span class="badge badge-${e.status==='active'?'success':e.status==='completed'?'primary':'danger'}">${e.status}</span></td>
          <td><div class="actions">
            ${canDo('status')?`<button class="btn btn-warning btn-sm" onclick="openStatusModal(${e.id},'${e.status}')">📋 Status</button>`:''}
            ${canDo('delete')?`<button class="btn btn-danger btn-sm" onclick="deleteEnrollment(${e.id})">🗑️</button>`:''}
            ${!canDo('status')?'<span style="color:var(--gray);font-size:13px">View only</span>':''}
          </div></td>
        </tr>`).join('');
    } catch(err) { showAlert('alertBox', err.message, 'danger'); }
  }

  async function saveEnrollment(e) {
    e.preventDefault();
    try {
      await apiFetch('/enrollment', { method:'POST', body:JSON.stringify({ studentId:parseInt(document.getElementById('eStudent').value), courseId:parseInt(document.getElementById('eCourse').value), enrollmentDate:document.getElementById('eDate').value }) });
      showAlert('alertBox','Enrolled successfully!','success');
      closeModal('enrollModal');
      loadAll();
    } catch(err) { showAlert('alertBox', err.message, 'danger'); }
  }

  function openStatusModal(id, status) {
    document.getElementById('statusEnrollId').value = id;
    document.getElementById('newStatus').value = status;
    openModal('statusModal');
  }

  async function updateStatus() {
    const id = document.getElementById('statusEnrollId').value;
    const status = document.getElementById('newStatus').value;
    try {
      await apiFetch(`/enrollment/${id}/status`,{method:'PUT',body:JSON.stringify({status})});
      showAlert('alertBox','Status updated!','success');
      closeModal('statusModal');
      loadAll();
    } catch(err) { showAlert('alertBox', err.message, 'danger'); }
  }

  async function deleteEnrollment(id) {
    if (!confirm('Remove this enrollment?')) return;
    try { await apiFetch(`/enrollment/${id}`,{method:'DELETE'}); showAlert('alertBox','Removed!','success'); loadAll(); }
    catch(err) { showAlert('alertBox', err.message, 'danger'); }
  }

  loadAll();
</script>
</body>
</html>
